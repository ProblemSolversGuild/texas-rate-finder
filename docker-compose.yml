version: "3"
services:
  frontend:
    image: "node"
    user: "node"
    working_dir: /home/node/app
    environment: 
      - NODE_ENV=development
    volumes:
      - ./:/home/node/app
    ports:
      - "3001:3001"
    command: bash -c "export PORT=3001 && export HTTPS=true && npm start && npx json-server --port 3001 --watch data/db.json"
  
  backend:
    image: "node"
    user: "node"
    working_dir: /home/node/app
    environment: 
      - NODE_ENV=development
    volumes:
      - ./:/home/node/app
    ports:
      - "4001:4001"
    command: bash -c "npx json-server --host 0.0.0.0 --port 4001 --watch src/data/db.json"